<section id="hero" class="hero">
  <div class="hero-glow"></div>

  <div class="avatar-wrap fade-up">
    <div class="avatar-ring">
      <div class="avatar-inner">

        <img src="assets/DSC_1311.JPG" alt="Your Name" class="avatar-img"> 
      </div>
      <!-- Replace with real photo:
      <img src="assets/photo.jpg" alt="Your Name" class="avatar-img"> -->
    </div>
  </div>

  <h1 class="hero-name fade-up">
    Hi I'm <span class="accent">Your Name</span>
  </h1>

  <div class="hero-roles fade-up">
    @for (role of roles; track role; let last = $last) {
      <span>{{ role }}<span *ngIf="!last" class="dot"> •</span></span>
    }
  </div>

  <p class="hero-desc fade-up">
    Building scalable and high-performance web applications for enterprises
    using React and Next.js.
  </p>

  <div class="hero-btns fade-up">
    <a href="#contact" class="btn-primary">
      Contact me
      <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
          clip-rule="evenodd"/>
      </svg>
    </a>
    <a href="assets/resume.pdf" download class="btn-outline">
      Download Resume
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd"
          d="M12 2.25a.75.75 0 0 1 .75.75v11.69l3.22-3.22a.75.75 0 1 1 1.06 1.06l-4.5 4.5a.75.75 0 0 1-1.06 0l-4.5-4.5a.75.75 0 1 1 1.06-1.06l3.22 3.22V3a.75.75 0 0 1 .75-.75Zm-9 13.5a.75.75 0 0 1 .75.75v2.25a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5V16.5a.75.75 0 0 1 1.5 0v2.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V16.5a.75.75 0 0 1 .75-.75Z"
          clip-rule="evenodd"/>
      </svg>
    </a>
  </div>
</section>
